proxy_cache_path /var/cache/nginx/gwc_cache
    levels=1:2
    keys_zone=gwc_cache:20m
    max_size=2g
    inactive=7d
    use_temp_path=off;
server {
  listen 80;
  server_name _;
  access_log /var/log/nginx/access.log gs;
  location = /nginx_status {
    stub_status;
    access_log off;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;
  }
  root /usr/share/nginx/html;
  index index.html;
  location / {
    try_files $uri $uri/ /index.html;
  }
  # ─── GWC tiles — with cache ────────────────────────────────────────────
  location /geoserver/gwc/ {
    proxy_pass http://geoserver:8080/geoserver/gwc/;
    # Cache
    proxy_cache            gwc_cache;
    proxy_cache_valid      200 206 7d;
    proxy_cache_valid       404  1m;   # don't cache 404 for long — may be seeding
    proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;
    proxy_cache_lock       on;          # duplicate requests wait instead of hitting the server
    proxy_cache_lock_timeout 5s;
    proxy_cache_key        "$request_method$uri$is_args$args";
    proxy_hide_header    Pragma;
    proxy_hide_header    Expires;
    # Don't suppress GWC Cache-Control — GWC knows what it's doing
    # proxy_ignore_headers Cache-Control Expires;  ← REMOVED
    # Browser cache: tiles are immutable for a given TIME+ELEVATION
    # GWC usually sends max-age, but adding a fallback just in case
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    # Debug header — shows HIT/MISS/BYPASS
    add_header X-Cache-Status $upstream_cache_status always;
    # CORS — if frontend is not on the same domain
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Accept" always;
    # Buffers
    proxy_buffer_size       128k;
    proxy_buffers           8 256k;
    proxy_busy_buffers_size 256k;
    # Timeouts
    proxy_connect_timeout   60s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  # ─── GeoServer other (WMS, admin, ...) — no caching ───────────────────
  location /geoserver/ {
    proxy_pass http://geoserver:8080/geoserver/;
    proxy_buffer_size          128k;
    proxy_buffers              8 256k;
    proxy_busy_buffers_size    256k;
    proxy_temp_file_write_size 256k;
    proxy_connect_timeout  60s;
    proxy_send_timeout     300s;
    proxy_read_timeout     300s;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 500M;
  }
}