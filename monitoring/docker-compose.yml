services:

  prometheus:
    image: prom/prometheus:latest
    container_name: mon_prometheus
    volumes:
      - /opt/geoserver/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - default
      - docker_default

  grafana:
    image: grafana/grafana:latest
    container_name: mon_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mon_cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter:latest
    container_name: mon_node_exporter
    command:
      - --path.rootfs=/rootfs
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    restart: unless-stopped

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: mon_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://gisadmin:geoserver@postgis:5432/gis?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped
    networks:
      - default
      - docker_default

  pgbouncer_exporter:
    image: spreaker/prometheus-pgbouncer-exporter:latest
    container_name: mon_pgbouncer_exporter
    ports:
      - "9127:9127"
    restart: unless-stopped
    volumes:
      - /opt/geoserver/monitoring/pgbouncer_exporter/config.yml:/etc/pgbouncer-exporter/config.yml:ro
    networks:
      - default
      - docker_default

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: mon_nginx_exporter
    command:
      - -nginx.scrape-uri=http://web/nginx_status
    ports:
      - "9113:9113"
    restart: unless-stopped
    networks:
      - default
      - docker_default

  loki:
    image: grafana/loki:latest
    container_name: mon_loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - /opt/geoserver/monitoring/loki/config.yml:/etc/loki/config.yml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: mon_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /opt/geoserver/monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /opt/geoserver/monitoring/nginx_logs:/var/log/nginx:ro
    restart: unless-stopped

volumes:
  grafana_data:

networks:
  docker_default:
    external: true