global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "cadvisor"
    static_configs:
      - targets: ["mon_cadvisor:8080"]

  - job_name: "postgres_exporter"
    static_configs:
      - targets: ["mon_postgres_exporter:9187"]

  - job_name: "pgbouncer_exporter"
    static_configs:
      - targets: ["mon_pgbouncer_exporter:9127"]

  - job_name: "nginx_exporter"
    static_configs:
      - targets: ["mon_nginx_exporter:9113"]

  # node exporter beží na host:9100
  - job_name: "node_exporter"
    static_configs:
      - targets: ["mon_node_exporter:9100"]
